name: Dev to Main Delivery

on:
  push:
    branches:
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet

      - name: Process Versioning and Index Cleanup
        run: |
          # 1. Extract base version (e.g., 2.4.1-dev)
          RAW_VERSION=$(grep "@version" Quad_Cortex_MIDI_control.lua | head -n 1 | awk '{print $3}')
          REV_COUNT=$(git rev-list --count HEAD)
          
          # 2. Download existing index.xml from main branch
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "No existing index found."

          if [[ $RAW_VERSION == *"-dev"* ]]; then
            # DEVELOPMENT MODE: Append commit count
            NEW_VERSION="${RAW_VERSION}.${REV_COUNT}"
            sed -i "s/@version $RAW_VERSION/@version $NEW_VERSION/g" Quad_Cortex_MIDI_control.lua
          else
            # STABLE RELEASE MODE: Purge dev version blocks from XML
            if [ -f index.xml ]; then
              xmlstarlet ed -L -d "//version[contains(@name, '-dev')]" index.xml
            fi
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install ReaPack-index
        run: gem install reapack-index

      - name: Build Index
        run: reapack-index

      - name: Deploy to Main Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: .
          commit-message: "Update delivery [rev $REV_COUNT] [skip ci]"
          clean: true