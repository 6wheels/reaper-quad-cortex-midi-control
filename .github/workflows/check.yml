name: Script Validation

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download existing index.xml from main
        run: |
          # Fetch the current index to allow contextual validation (version increments, etc.)
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "No existing index found."

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install ReaPack-index
        run: gem install reapack-index

      - name: Run Metadata Check
        run: |
          # Validates headers and checks if the new versions are valid compared to the fetched index
          reapack-index --check