name: Script Validation and Delivery

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  # --- JOB 1: VALIDATION ---
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Download existing index from main
        run: |
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "No existing index found."

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install ReaPack-index
        run: gem install reapack-index

      - name: Run Metadata Check
        run: reapack-index --check

  # --- JOB 2: DEPLOYMENT ---
  deploy:
    runs-on: ubuntu-latest
    needs: check # Wait for validation to pass
    if: github.event_name == 'push'
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet pandoc

      - name: Process Versioning and Index Cleanup
        run: |
          # 1. Extract base version
          RAW_VERSION=$(grep "@version" Quad_Cortex_MIDI_control.lua | head -n 1 | awk '{print $3}')
          REV_COUNT=$(git rev-list --count HEAD)
          
          # 2. Download existing index.xml
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "No existing index found."

          if [[ $RAW_VERSION == *"-dev"* ]]; then
            # DEV MODE: Version update
            NEW_VERSION="${RAW_VERSION}.${REV_COUNT}"
            sed -i "s/@version $RAW_VERSION/@version $NEW_VERSION/g" Quad_Cortex_MIDI_control.lua
          else
            # STABLE MODE: XML cleanup
            if [ -f index.xml ]; then
              xmlstarlet ed -L -d "//version[contains(@name, '-dev')]" index.xml
            fi
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install ReaPack-index
        run: gem install reapack-index

      - name: Build Index
        run: reapack-index

      - name: Deploy to Main Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: .
          commit-message: "Update delivery [rev $REV_COUNT] [skip ci]"
          clean: true
