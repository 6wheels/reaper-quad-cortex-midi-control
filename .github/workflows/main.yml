name: Script Validation and Delivery

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  # --- JOB 1: VALIDATION ---
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Download existing index from main
        run: |
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "No existing index found."

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install ReaPack-index
        run: gem install reapack-index

      - name: Run Metadata Check
        run: reapack-index --check

  # --- JOB 2: DEPLOYMENT ---
  deploy:
    runs-on: ubuntu-latest
    needs: check # Wait for validation to pass
    if: github.event_name == 'push'
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet pandoc

      - name: Process Versioning and Index Cleanup
        run: |
          # Stop the script execution if any command fails
          set -e

          # 1. Find the script path dynamically (searches in subdirectories)
          SCRIPT_PATH=$(find . -name "Quad_Cortex_MIDI_control.lua" -print -quit)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "::error::File Quad_Cortex_MIDI_control.lua not found in any directory!"
            exit 1
          fi
          
          echo "Found script at: $SCRIPT_PATH"

          # 2. Extract base version
          RAW_VERSION=$(grep "@version" "$SCRIPT_PATH" | head -n 1 | awk '{print $3}')
          REV_COUNT=$(git rev-list --count HEAD)
          
          # 3. Download existing index.xml
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "No existing index found."

          if [[ $RAW_VERSION == *"-dev"* ]]; then
            NEW_VERSION="${RAW_VERSION}.${REV_COUNT}"
            sed -i "s/@version $RAW_VERSION/@version $NEW_VERSION/g" "$SCRIPT_PATH"
            echo "Version updated to $NEW_VERSION in $SCRIPT_PATH"
          else
            if [ -f index.xml ]; then
              xmlstarlet ed -L -d "//version[contains(@name, '-dev')]" index.xml
              echo "Stable release: Purged dev versions."
            fi
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install ReaPack-index
        run: gem install reapack-index

      - name: Build Index
        run: reapack-index

      - name: Deploy to Main Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: .
          commit-message: "Update delivery [rev $REV_COUNT] [skip ci]"
          clean: true
