name: ReaPack Validation and Delivery

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SysDeps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Run Check
        run: |
          echo "--- 🔍 Starting Metadata Validation ---"
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "⚠️ No index found on main, skipping comparative check."
          bundle exec reapack-index --check
          echo "--- ✅ Validation Successful ---"

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install SysDeps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xmlstarlet pandoc
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Build and Sync
        run: |
          set -e
          echo "--- 🛠️ Starting Deployment Pipeline ---"

          # 1. Identity
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # 2. File & Version Search
          SCRIPT_PATH=$(find . -name "Quad_Cortex_MIDI_control.lua" -print -quit)
          RAW_VERSION=$(grep "@version" "$SCRIPT_PATH" | head -n 1 | awk '{print $3}')
          REV_COUNT=$(git rev-list --count HEAD)
          
          if [[ $RAW_VERSION == *"-dev"* ]]; then
            DEPLOY_VER="${RAW_VERSION}.${REV_COUNT}"
          else
            DEPLOY_VER="$RAW_VERSION"
          fi
          echo "Target Version: $DEPLOY_VER"

          # 3. Fetch current index (CRITICAL STEP)
          echo "Step 3: Fetching index.xml from 'main'..."
          # -s (silent), -f (fail on HTTP error), -L (follow redirects)
          if ! curl -s -f -L "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml; then
            echo "❌ FATAL: Unable to fetch index.xml from 'main' branch!"
            echo "This could mean the file is missing, the branch is protected, or a network error occurred."
            echo "To prevent overwriting your repository history, the process is stopping now."
            exit 1
          fi
          echo "✅ index.xml successfully retrieved."

          # 4. Update the .lua file
          sed -i "s/@version $RAW_VERSION/@version $DEPLOY_VER/g" "$SCRIPT_PATH"

          # 5. FIRST COMMIT: The code change (SHA-A)
          git add "$SCRIPT_PATH"
          git commit -m "Release Code: $DEPLOY_VER [rev $REV_COUNT]"
          echo "SHA-A created."

          # 6. INDEXING: Let reapack-index do its thing (it will add the old versions back)
          echo "Step 6: Running reapack-index..."
          bundle exec reapack-index --no-commit

          # 7. SURGICAL CLEANUP: Delete dev versions that are NOT the current one
          # Logic: Find all <version> where name contains 'dev' AND name is NOT our new version
          echo "Step 7: Pruning phantom dev versions from index.xml..."
          if [ -f index.xml ]; then
            BEFORE=$(xmlstarlet sel -t -v "count(//*[local-name()='version'])" index.xml || echo "0")
            
            # Magi command to keep only stable and current dev versions, but delete old dev ones
            xmlstarlet ed -L -d "//*[local-name()='version'][contains(@name, '-dev') and @name != '$DEPLOY_VER']" index.xml
            
            AFTER=$(xmlstarlet sel -t -v "count(//*[local-name()='version'])" index.xml || echo "0")
            echo "Cleaned index: $BEFORE -> $AFTER versions (Removed $((BEFORE - AFTER)) old dev entries)."
          fi

          # 8. Second Commit (Index)
          git add -f index.xml
          git commit -m "Update Index for $DEPLOY_VER [skip ci]"

          # 9. Final Push
          git push origin HEAD:main --force
          echo "--- 🎉 Deployment Complete! ---"
