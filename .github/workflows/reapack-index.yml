name: ReaPack Validation and Delivery

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SysDeps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Run Check
        run: |
          echo "--- 🔍 Starting Metadata Validation ---"
          curl -s "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml || echo "⚠️ No index found on main, skipping comparative check."
          bundle exec reapack-index --check
          echo "--- ✅ Validation Successful ---"

  deploy:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install SysDeps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xmlstarlet pandoc
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      - name: Build and Sync
        run: |
          set -e
          echo "--- 🛠️ Starting Deployment Pipeline ---"

          # 1. Identity
          echo "Step 1: Configuring Git identity..."
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # 2. File & Version Search
          echo "Step 2: Locating script and extracting version info..."
          SCRIPT_PATH=$(find . -name "Quad_Cortex_MIDI_control.lua" -print -quit)
          if [ -z "$SCRIPT_PATH" ]; then
            echo "❌ FATAL: Script not found!"
            exit 1
          fi
          
          RAW_VERSION=$(grep "@version" "$SCRIPT_PATH" | head -n 1 | awk '{print $3}')
          REV_COUNT=$(git rev-list --count HEAD)
          
          # Logic: Stable vs Dev
          if [[ $RAW_VERSION == *"-dev"* ]]; then
            DEPLOY_VER="${RAW_VERSION}.${REV_COUNT}"
            IS_STABLE=false
          else
            DEPLOY_VER="$RAW_VERSION"
            IS_STABLE=true
          fi
          echo "Found script: $SCRIPT_PATH"
          echo "Target Version: $DEPLOY_VER (Stable: $IS_STABLE) | Revision: $REV_COUNT"

          # 3. Secure Fetch of existing index
          echo "Step 3: Fetching index.xml from 'main'..."
          if ! curl -s -f -L "https://raw.githubusercontent.com/${{ github.repository }}/main/index.xml" -o index.xml; then
            echo "❌ FATAL: index.xml not found on 'main'. Aborting."
            exit 1
          fi

          # 4. VERSION INJECTION (Crucial for the indexer and the 'main' branch)
          echo "Step 4: Injecting $DEPLOY_VER into the script..."
          # This modifies the file on the CI runner's disk. 
          # It will be pushed to 'main' but NEVER committed back to 'dev'.
          sed -i "s/@version $RAW_VERSION/@version $DEPLOY_VER/" "$SCRIPT_PATH"

          # 5. INDEXING
          echo "Step 5: Running reapack-index..."
          # The indexer now sees the version with the revision count
          bundle exec reapack-index --no-commit

          # 6. SURGICAL CLEANUP: Delete old dev versions
          echo "Step 6: Pruning phantom dev versions from index.xml..."
          if [ -f index.xml ]; then
            BEFORE=$(xmlstarlet sel -t -v "count(//*[local-name()='version'])" index.xml || echo "0")
            
            # Keep stable versions and the CURRENT deploy version
            xmlstarlet ed -L -d "//*[local-name()='version'][contains(@name, '-dev') and @name != '$DEPLOY_VER']" index.xml
            
            AFTER=$(xmlstarlet sel -t -v "count(//*[local-name()='version'])" index.xml || echo "0")
            echo "Cleaned index: $BEFORE -> $AFTER versions."
          fi

          # 7. Commit (Index only)
          echo "Step 7: Committing updated index.xml..."
          git add -f index.xml
          git commit -m "Update index for $DEPLOY_VER [skip ci]"

          # 8. Final Push to Main
          echo "Step 8: Force-pushing to 'main'..."
          # This pushes the modified index AND the modified .lua script to 'main'
          git push origin HEAD:main --force

          # 9. AUTOMATIC TAGGING (Only for stable releases)
          if [ "$IS_STABLE" = true ]; then
            echo "Step 9: Stable release detected. Checking for Tag: $DEPLOY_VER"
            if git ls-remote --tags origin | grep -q "refs/tags/$DEPLOY_VER"; then
              echo "⚠️ Tag $DEPLOY_VER already exists. Skipping."
            else
              git tag "$DEPLOY_VER"
              git push origin "$DEPLOY_VER"
              echo "✅ Tag '$DEPLOY_VER' successfully created."
            fi
          else
            echo "Step 9: Development version. Skipping tag creation."
          fi

          echo "--- 🎉 Deployment Complete! ---"